[workspace]
resolver = "3"
members = ["crates/lh-io", "app/lion-heart"]

[workspace.package]
version = "0.0.1"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/Johnny1110/lion-heart"

[workspace.dependencies]
# audio
cpal = "0.18"
rtrb = "0.3"
# cli & errors
clap = { version = "4.6", features = ["derive"] }
thiserror = "2"
anyhow = "1"
ctrlc = "3.5"
# internal
lh-io = { path = "crates/lh-io" }

[profile.release]
lto = "thin"
